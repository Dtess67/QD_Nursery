baseline_findings:
  - id: funnel_path_dependence
    status: observed
    statement: Permutations of one fixed three-item evidence set produced materially different Assessor outcomes.

  - id: fixed_input_variance
    status: observed
    statement: Repeated controlled evaluations sometimes changed despite identical recorded evidence.

  - id: retrieval_variance
    status: observed
    statement: Repeated live evaluations sometimes received different evidence sets.

  - id: framing_sensitivity
    status: observed
    statement: Adding a loaded preface changed the MMR proposition from stable support to contested.

  - id: confident_false_support
    status: observed
    statement: The Assessor confidently supported obvious false or fictional claims in live evaluations.

  - id: confidence_not_calibrated
    status: observed
    statement: Confidence did not demonstrate stability; the alcohol claim received equal high confidence for opposite signs.

  - id: falsifier_selectivity
    status: uncalibrated
    statement: The Falsifier rejected every live evaluation and varied across repeated controlled evaluations.

  - id: duplicate_family_effect
    status: not_demonstrated
    statement: The single-versus-triplicate controlled fixture did not show duplicate-source confidence inflation.

known_failures_and_unearned_claims:
  - id: evidence_relation_boolean
    status: open
    statement: source_endorses_claim compresses REFUTES, NEUTRAL, satire, quotation, and malformed output into false.

  - id: funnel_closed_world
    status: confirmed_failure
    statement: Survivor polarity cannot author a decisive verdict because the model-generated hypothesis base is non-exhaustive.

  - id: funnel_verdict_authority
    status: withdrawn
    statement: Funnel convergence is diagnostic evidence only and does not earn authority to declare truth.

  - id: confidence_formula
    status: open
    statement: Confidence is not calibrated to demonstrated stability, source independence, or measured reliability.

  - id: source_and_hypothesis_independence
    status: open
    statement: Source and hypothesis families are not yet structurally represented, though the baseline duplicate fixture did not demonstrate inflation.

  - id: ledger_replay_completeness
    status: open
    statement: Ordinary runs do not yet preserve every raw prompt, model output, source relation, model parameter, and code state needed for complete replay.

  - id: conflict_origin_enum
    status: rejected_before_build
    statement: POSITIONAL or REASONING causal labels overclaim what access comparison and equalized reruns can establish.

ratified_direction_not_yet_built:
  - id: four_state_source_relation
    status: next
    statement: Replace the Boolean relation with SUPPORTS, REFUTES, NEUTRAL, and UNCLEAR.

  - id: clean_room_relation_classifier
    status: next
    statement: Classify each source separately from hypothesis generation, other sources, and prior conclusions.

  - id: auditable_diagnostic_funnel
    status: planned
    statement: Preserve hypotheses and eliminating observations while withholding verdict authority from survivor polarity.

  - id: disagreement_hypothesis_ledger
    status: planned
    statement: Record possible disagreement explanations as ELIMINATED, SURVIVING, or UNTESTED without appointing a cause.

  - id: confidence_redesign
    status: planned
    statement: Confidence must be earned through measured calibration, stability, provenance, and demonstrated independence.

  - id: source_family_identity
    status: planned
    statement: Collapse repeated or syndicated sources into evidence families before treating agreement as replication.

next_gate:
  id: four_state_clean_room_relation_v1
  purpose: Determine what each source actually does relative to an atomic claim without contamination from hypotheses or other source conclusions.

  required_dimensions:
    - direct support
    - direct refutation
    - neutral reporting
    - quotation without endorsement
    - satire and fiction
    - unclear or insufficient context
    - malformed model output
    - polarity symmetry
    - order independence
    - repeated-run stability

  rule: The classifier receives no verdict authority until deterministic and live benchmarks demonstrate that its labels are stable and auditable.

build_freeze:
  active: false
  released_by: baseline_benchmark_current_kernel
  released_on: 2026-07-10

  still_parked:
